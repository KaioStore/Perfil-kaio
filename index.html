<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Perfil - Kaio Store</title>
  <script defer src="script.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #0a0f1f, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 140, 255, 0.3);
      width: 300px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      border: 3px solid gold;
    }

    h1 {
      margin: 10px 0;
    }

    .vip {
      color: gold;
      margin: 10px 0;
    }

    .box {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #0d1b2a;
      box-shadow: 0 0 10px rgba(0, 140, 255, 0.4);
    }
  </style>
</head>
<body>

<div class="card">
  <img id="avatar">
  <h1 id="nome">...</h1>
  <div class="vip" id="vip">VIP: ...</div>

  <div class="box">
    Total gasto:<br>
    <strong id="gasto">R$0</strong>
  </div>
</div>

</body>
</html>
