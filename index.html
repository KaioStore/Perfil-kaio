<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kaio Store</title>
<script defer src="script.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0a0f1f, #000);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn {
  background: #0d1b2a;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

.perfil {
  margin-top: 30px;
}

.avatar {
  width: 120px;
  border-radius: 50%;
  border: 4px solid gold;
}

.nome {
  font-size: 28px;
  margin: 10px 0;
}

.rank {
  color: gold;
  margin-bottom: 20px;
}

.boxes {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 20px;
  flex-wrap: wrap;
}

.box {
  padding: 20px;
  border-radius: 15px;
  width: 200px;
}

.gasto {
  background: #0d1b2a;
  box-shadow: 0 0 15px rgba(0, 140, 255, 0.5);
}

.vip {
  background: #1a1400;
  box-shadow: 0 0 15px gold;
}

.voltar {
  margin-top: 30px;
  padding: 15px;
  border-radius: 10px;
  background: #0d1b2a;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <h2>Kaio Store</h2>
    <div class="btn" onclick="voltar()">Minha Conta</div>
  </div>

  <div class="perfil">
    <img id="avatar" class="avatar">
    <div class="nome" id="nome"></div>
    <div class="rank" id="rank"></div>
  </div>

  <div class="boxes">
    <div class="box gasto">
      Total gasto:<br>
      <strong id="gasto"></strong>
    </div>

    <div class="box vip">
      VIP atual:<br>
      <strong id="vip"></strong>
    </div>
  </div>

  <div class="voltar" onclick="voltar()">
    Voltar ao Ranking
  </div>

</div>

</body>
</html>
